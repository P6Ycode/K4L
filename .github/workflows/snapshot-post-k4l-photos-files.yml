name: Snapshot post-K4L Photos files

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/snapshot-post-k4l-photos-files.trigger'

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          submodules: recursive

      - name: Apply K4L source layer
        shell: bash
        run: |
          set -euo pipefail
          PATCH_FILE="$RUNNER_TEMP/k4l-changes.patch"
          python3 -c "import base64,sys; sys.stdout.buffer.write(base64.b64decode(open('.k4l/k4l-changes.patch.gz.b64','rb').read()))" | gzip -dc > "$PATCH_FILE"
          git apply --binary \
            --exclude=.github/workflows/buildapp.yml \
            --exclude=.github/workflows/k4l-private-build.yml \
            --exclude=.github/workflows/k4l-release-notes.yml \
            "$PATCH_FILE"
          python3 -c "import base64,sys; sys.stdout.buffer.write(base64.b64decode(open('.k4l/k4l-new-files.tar.gz.b64','rb').read()))" | tar -xzf - -C .
          mkdir -p "$RUNNER_TEMP/post-base"
          cp src/Shared/Downloads/SPKDownloadDestinationWriter.h "$RUNNER_TEMP/post-base/"
          cp src/Shared/Downloads/SPKDownloadDestinationWriter.m "$RUNNER_TEMP/post-base/"
          cp src/Shared/Gallery/SPKGalleryViewController.m "$RUNNER_TEMP/post-base/"
          cp src/Shared/MediaPreview/SPKFullScreenMediaPlayer.m "$RUNNER_TEMP/post-base/"

      - name: Store source snapshots
        uses: actions/github-script@v7
        env:
          SNAPSHOT_DIR: ${{ runner.temp }}/post-base
        with:
          script: |
            const fs = require('fs');
            const pathModule = require('path');
            const { owner, repo } = context.repo;
            const files = [
              'SPKDownloadDestinationWriter.h',
              'SPKDownloadDestinationWriter.m',
              'SPKGalleryViewController.m',
              'SPKFullScreenMediaPlayer.m'
            ];
            for (const name of files) {
              const path = `.k4l-diagnostics/post-base/${name}`;
              const body = fs.readFileSync(pathModule.join(process.env.SNAPSHOT_DIR, name));
              let sha;
              try {
                const existing = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
                if (!Array.isArray(existing.data)) sha = existing.data.sha;
              } catch (error) { if (error.status !== 404) throw error; }
              await github.rest.repos.createOrUpdateFileContents({
                owner, repo, path, branch: 'main',
                message: `snapshot post-K4L ${name}`,
                content: body.toString('base64'),
                ...(sha ? { sha } : {})
              });
            }

      - name: Remove one-time snapshot workflow
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            for (const path of ['.github/workflows/snapshot-post-k4l-photos-files.yml', '.github/workflows/snapshot-post-k4l-photos-files.trigger']) {
              try {
                const response = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
                if (!Array.isArray(response.data)) await github.rest.repos.deleteFile({ owner, repo, path, branch: 'main', sha: response.data.sha, message: 'remove post-K4L Photos source snapshot' });
              } catch (error) { if (error.status !== 404) core.warning(`${path}: ${error.message}`); }
            }
