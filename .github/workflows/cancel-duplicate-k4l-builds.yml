name: Cancel duplicate K4L builds

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/cancel-duplicate-k4l-builds.trigger'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cancel-duplicates:
    runs-on: ubuntu-latest
    steps:
      - name: Keep only the newest K4L build
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const activeStatuses = new Set([
              'queued',
              'in_progress',
              'waiting',
              'requested',
              'pending'
            ]);
            const buildPaths = new Set([
              '.github/workflows/k4l-private-build.yml',
              '.github/workflows/buildapp.yml'
            ]);

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              { owner, repo, per_page: 100 }
            );

            const activeBuilds = runs
              .filter(run => activeStatuses.has(run.status))
              .filter(run => buildPaths.has(run.path))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            if (activeBuilds.length <= 1) {
              core.notice(`Only ${activeBuilds.length} active K4L build remains.`);
              return;
            }

            const keep = activeBuilds[0];
            core.notice(`Keeping newest K4L build run ${keep.id}.`);

            for (const run of activeBuilds.slice(1)) {
              core.notice(`Cancelling duplicate K4L build run ${run.id}.`);
              await github.rest.actions.cancelWorkflowRun({
                owner,
                repo,
                run_id: run.id
              });
            }
