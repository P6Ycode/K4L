name: Wire iOS 27 Photos hotfix atomically

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/wire-ios27-photos-hotfix-api.trigger'

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - name: Update the main IPA workflow atomically
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const path = '.github/workflows/k4l-private-build.yml';
            const response = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
            if (Array.isArray(response.data)) throw new Error('Expected the IPA workflow file');
            let text = Buffer.from(response.data.content, 'base64').toString('utf8');
            const marker = "          rm -rf main/.k4l\n";
            const hotfix = "          git -C main apply --check --binary .k4l/k4l-ios27-photos-hotfix.patch\n          git -C main apply --binary .k4l/k4l-ios27-photos-hotfix.patch\n";
            if (!text.includes(hotfix)) {
              if (!text.includes(marker)) throw new Error('Could not find the .k4l cleanup marker');
              text = text.replace(marker, hotfix + marker);
              await github.rest.repos.createOrUpdateFileContents({
                owner, repo, path, branch: 'main', sha: response.data.sha,
                message: 'apply iOS 27 Photos hotfix in IPA builds',
                content: Buffer.from(text).toString('base64')
              });
            }

      - name: Remove one-time atomic wiring files
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            for (const path of [
              '.github/workflows/wire-ios27-photos-hotfix-api.yml',
              '.github/workflows/wire-ios27-photos-hotfix-api.trigger'
            ]) {
              try {
                const response = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
                if (!Array.isArray(response.data)) {
                  await github.rest.repos.deleteFile({
                    owner, repo, path, branch: 'main', sha: response.data.sha,
                    message: 'remove one-time atomic iOS 27 hotfix wiring'
                  });
                }
              } catch (error) {
                if (error.status !== 404) core.warning(`${path}: ${error.message}`);
              }
            }
