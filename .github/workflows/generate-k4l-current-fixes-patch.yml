name: Generate K4L current fixes patch

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/generate-k4l-current-fixes-patch.trigger'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: recursive

      - name: Build post-K4L baseline
        shell: bash
        run: |
          set -euo pipefail
          PATCH_FILE="$RUNNER_TEMP/k4l-changes.patch"
          python3 -c "import base64,sys; sys.stdout.buffer.write(base64.b64decode(open('.k4l/k4l-changes.patch.gz.b64','rb').read()))" | gzip -dc > "$PATCH_FILE"
          git apply --binary \
            --exclude=.github/workflows/buildapp.yml \
            --exclude=.github/workflows/k4l-private-build.yml \
            --exclude=.github/workflows/k4l-release-notes.yml \
            "$PATCH_FILE"
          python3 -c "import base64,sys; sys.stdout.buffer.write(base64.b64decode(open('.k4l/k4l-new-files.tar.gz.b64','rb').read()))" | tar -xzf - -C .
          git config user.name 'K4L Patch Builder'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'temporary post-K4L baseline'

      - name: Generate and validate combined fixes patch
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/generate_k4l_current_fixes.py
          git diff --check
          git diff --binary HEAD -- \
            src/Shared/Downloads/SPKDownloadDestinationWriter.h \
            src/Shared/Downloads/SPKDownloadDestinationWriter.m \
            src/Shared/Gallery/SPKGalleryViewController.m \
            src/Shared/MediaPreview/SPKFullScreenMediaPlayer.m \
            src/Features/Tools/HideTestFlightPopup.x \
            > "$RUNNER_TEMP/k4l-current-fixes.patch"
          test -s "$RUNNER_TEMP/k4l-current-fixes.patch"
          git reset --hard HEAD
          git apply --check --binary "$RUNNER_TEMP/k4l-current-fixes.patch"
          git apply --binary "$RUNNER_TEMP/k4l-current-fixes.patch"
          git diff --check

      - name: Store combined fixes patch
        uses: actions/github-script@v7
        env:
          PATCH_PATH: ${{ runner.temp }}/k4l-current-fixes.patch
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const path = '.k4l-diagnostics/k4l-current-fixes.patch';
            const body = fs.readFileSync(process.env.PATCH_PATH);
            let sha;
            try {
              const existing = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
              if (!Array.isArray(existing.data)) sha = existing.data.sha;
            } catch (error) { if (error.status !== 404) throw error; }
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path, branch: 'main',
              message: 'store validated K4L current fixes patch',
              content: body.toString('base64'),
              ...(sha ? { sha } : {})
            });

      - name: Remove one-time patch generator
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            for (const path of [
              '.github/workflows/generate-k4l-current-fixes-patch.yml',
              '.github/workflows/generate-k4l-current-fixes-patch.trigger',
              '.github/scripts/generate_k4l_current_fixes.py'
            ]) {
              try {
                const response = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
                if (!Array.isArray(response.data)) {
                  await github.rest.repos.deleteFile({ owner, repo, path, branch: 'main', sha: response.data.sha, message: 'remove one-time combined fixes patch generator' });
                }
              } catch (error) {
                if (error.status !== 404) core.warning(`${path}: ${error.message}`);
              }
            }
