name: Clean failed K4L workflow runs

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/cleanup-failed-k4l-runs.trigger'

permissions:
  actions: write
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete completed non-successful runs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const currentRunId = Number(context.runId);
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              { owner, repo, per_page: 100 }
            );
            const targets = runs.filter(run =>
              Number(run.id) !== currentRunId &&
              run.status === 'completed' &&
              run.conclusion !== 'success'
            );
            core.info(`Deleting ${targets.length} completed non-successful runs.`);
            for (const run of targets) {
              try {
                await github.rest.actions.deleteWorkflowRun({
                  owner, repo, run_id: run.id
                });
                core.info(`Deleted ${run.id}: ${run.name} (${run.conclusion})`);
              } catch (error) {
                core.warning(`Could not delete ${run.id}: ${error.message}`);
              }
            }

      - name: Remove one-time cleanup files
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            for (const path of [
              '.github/workflows/cleanup-failed-k4l-runs.yml',
              '.github/workflows/cleanup-failed-k4l-runs.trigger'
            ]) {
              try {
                const current = await github.rest.repos.getContent({
                  owner, repo, path, ref: 'main'
                });
                if (!Array.isArray(current.data)) {
                  await github.rest.repos.deleteFile({
                    owner, repo, path,
                    branch: 'main',
                    sha: current.data.sha,
                    message: 'remove one-time failed workflow cleanup'
                  });
                }
              } catch (error) {
                if (error.status !== 404) core.warning(`${path}: ${error.message}`);
              }
            }
