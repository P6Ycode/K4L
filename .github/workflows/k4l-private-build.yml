name: Build private K4L IPA

on:
  push:
    branches:
      - k4l-custom
  workflow_dispatch:

concurrency:
  group: k4l-private-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout private K4L repository
        uses: actions/checkout@v4
        with:
          path: main
          submodules: recursive

      - name: Apply K4L source changes
        shell: bash
        run: |
          base64 --decode main/.k4l/k4l-changes.patch.gz.b64 | gzip -dc | git -C main apply --binary -
          base64 --decode main/.k4l/k4l-new-files.tar.gz.b64 | tar -xzf - -C main
          rm -rf main/.k4l
          git -C main diff --check

      - name: Install build dependencies
        run: brew install ldid dpkg make autoconf automake cmake libtool meson nasm ninja pkgconf wget yasm

      - name: Use GNU Make
        run: echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Set up Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: 405e5c6ddb288615c030eeaedc6b265aae748285
          path: ${{ github.workspace }}/theos
          submodules: recursive

      - name: Cache iOS SDK
        id: sdk
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos/sdks/
          key: iPhoneOS16.2.sdk

      - name: Download iOS SDK
        if: steps.sdk.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/xybp888/iOS-SDKs/
          cd iOS-SDKs
          git sparse-checkout set --no-cone iPhoneOS16.2.sdk
          git checkout
          mv *.sdk "$THEOS/sdks"
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Download private Instagram input IPA
        shell: bash
        run: |
          mkdir -p main/packages
          gh release download input-ipa --repo "$GITHUB_REPOSITORY" --pattern "*.ipa" --dir main/packages
          INPUT_IPA="$(find main/packages -maxdepth 1 -name '*.ipa' | head -n 1)"
          test -n "$INPUT_IPA"
          mv "$INPUT_IPA" main/packages/com.burbn.instagram.ipa
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Cache FFmpeg frameworks
        id: ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            main/modules/ffmpegkit
            main/.cache/ffmpegkit
          key: ffmpegkit-${{ runner.os }}-${{ hashFiles('main/fetch-ffmpegkit.sh') }}

      - name: Prepare FFmpeg frameworks
        shell: bash
        run: |
          cd main
          chmod +x fetch-ffmpegkit.sh
          ./fetch-ffmpegkit.sh

      - name: Install IPA injection tools
        shell: bash
        run: |
          pip install --force-reinstall https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip
          curl -Lo main/ipapatch https://github.com/asdfzxcvbn/ipapatch/releases/download/v2.1.3/ipapatch.macos-arm64
          chmod +x main/ipapatch
          echo "${{ github.workspace }}/main" >> "$GITHUB_PATH"

      - name: Build and inject K4L
        shell: bash
        run: |
          cd main
          ./build.sh ipa --release
          ls -lh packages/K4L*_IG_v*.ipa
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload K4L IPA
        uses: actions/upload-artifact@v4
        with:
          name: K4L-v1.2.0-Instagram-439
          path: main/packages/K4L*_IG_v*.ipa
          if-no-files-found: error
