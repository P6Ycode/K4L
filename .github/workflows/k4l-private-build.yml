# Restored from the last successful K4L IPA build workflow.
name: Build private K4L IPA

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.release-notes/**'
      - '.github/workflows/k4l-release-notes.yml'
  workflow_dispatch:

concurrency:
  group: k4l-private-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout private K4L repository
        uses: actions/checkout@v4
        with:
          path: main
          submodules: recursive

      - name: Apply K4L source changes
        shell: bash
        run: |
          python3 -c "import base64,sys; sys.stdout.buffer.write(base64.b64decode(open('main/.k4l/k4l-changes.patch.gz.b64','rb').read()))" | gzip -dc | git -C main apply --binary -
          python3 -c "import base64,sys; sys.stdout.buffer.write(base64.b64decode(open('main/.k4l/k4l-new-files.tar.gz.b64','rb').read()))" | tar -xzf - -C main
          rm -rf main/.k4l
          git -C main diff --check

      - name: Install build dependencies
        run: brew install ldid dpkg make autoconf automake cmake libtool meson nasm ninja pkgconf wget yasm

      - name: Use GNU Make
        run: echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Set up Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: 405e5c6ddb288615c030eeaedc6b265aae748285
          path: ${{ github.workspace }}/theos
          submodules: recursive

      - name: Cache iOS SDK
        id: sdk
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos/sdks/
          key: iPhoneOS16.2.sdk

      - name: Download iOS SDK
        if: steps.sdk.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/xybp888/iOS-SDKs/
          cd iOS-SDKs
          git sparse-checkout set --no-cone iPhoneOS16.2.sdk
          git checkout
          mv *.sdk "$THEOS/sdks"
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Download private Instagram input IPA
        shell: bash
        run: |
          mkdir -p main/packages
          ASSET_API_URL="$(gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" --paginate --jq '.[] | .assets[] | select(.name | endswith(".ipa")) | select(.name != "K4L.ipa") | .url' | head -n 1)"
          if [ -z "$ASSET_API_URL" ]; then
            echo "::error::No .ipa release asset was found in this private repository."
            exit 1
          fi
          gh api -H "Accept: application/octet-stream" "$ASSET_API_URL" > main/packages/com.burbn.instagram.ipa
          unzip -t main/packages/com.burbn.instagram.ipa >/dev/null
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Cache FFmpeg frameworks
        id: ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            main/modules/ffmpegkit
            main/.cache/ffmpegkit
          key: ffmpegkit-${{ runner.os }}-${{ hashFiles('main/fetch-ffmpegkit.sh') }}

      - name: Prepare FFmpeg frameworks
        shell: bash
        run: |
          cd main
          chmod +x fetch-ffmpegkit.sh
          ./fetch-ffmpegkit.sh

      - name: Install IPA injection tools
        shell: bash
        run: |
          pip install --force-reinstall https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip
          curl -Lo main/ipapatch https://github.com/asdfzxcvbn/ipapatch/releases/download/v2.1.3/ipapatch.macos-arm64
          chmod +x main/ipapatch
          echo "${{ github.workspace }}/main" >> "$GITHUB_PATH"

      - name: Build and inject K4L
        shell: bash
        run: |
          cd main
          ./build.sh ipa --release
          OUTPUT_IPA="$(find packages -maxdepth 1 -name 'K4L*_IG_v*.ipa' | head -n 1)"
          test -n "$OUTPUT_IPA"
          cp "$OUTPUT_IPA" packages/K4L.ipa
          ls -lh packages/K4L.ipa
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload K4L IPA
        uses: actions/upload-artifact@v4
        with:
          name: K4L
          path: main/packages/K4L.ipa
          if-no-files-found: error

      - name: Publish private K4L release
        shell: bash
        run: |
          if ! gh release view k4l-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create k4l-latest --repo "$GITHUB_REPOSITORY" --title "K4L" --notes "K4L v1.2.0 for Instagram 439.0.0. Built privately for sideloading with Sideloadly."
          fi
          gh release upload k4l-latest main/packages/K4L.ipa --repo "$GITHUB_REPOSITORY" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
