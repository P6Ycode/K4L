name: Build private K4L IPA

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.release-notes/**'
      - '.github/workflows/**'
      - '.k4l-diagnostics/**'
  workflow_dispatch:

concurrency:
  group: k4l-ipa-build-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      actions: write
      contents: write

    steps:
      - name: Cancel older duplicate K4L runs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const currentRunId = Number(context.runId);
            const activeStatuses = new Set(['queued', 'in_progress', 'waiting', 'requested', 'pending']);
            const duplicatePaths = new Set([
              '.github/workflows/k4l-private-build.yml',
              '.github/workflows/cancel-duplicate-k4l-builds.yml',
              '.github/workflows/buildapp.yml'
            ]);

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              { owner, repo, per_page: 100 }
            );

            const duplicates = runs
              .filter(run => Number(run.id) !== currentRunId)
              .filter(run => Number(run.id) < currentRunId)
              .filter(run => activeStatuses.has(run.status))
              .filter(run => duplicatePaths.has(run.path));

            for (const run of duplicates) {
              try {
                await github.rest.actions.cancelWorkflowRun({ owner, repo, run_id: run.id });
                core.notice(`Cancelled older duplicate run ${run.id}: ${run.name}`);
              } catch (error) {
                core.warning(`Could not cancel run ${run.id}: ${error.message}`);
              }
            }

      - name: Checkout private K4L repository
        uses: actions/checkout@v4
        with:
          path: main
          submodules: recursive

      - name: Apply K4L source changes
        shell: bash
        run: |
          set -euo pipefail
          PATCH_FILE="$RUNNER_TEMP/k4l-changes.patch"
          python3 -c "import base64,sys; sys.stdout.buffer.write(base64.b64decode(open('main/.k4l/k4l-changes.patch.gz.b64','rb').read()))" | gzip -dc > "$PATCH_FILE"

          git -C main apply --check --binary \
            --exclude=.github/workflows/buildapp.yml \
            --exclude=.github/workflows/k4l-private-build.yml \
            --exclude=.github/workflows/k4l-release-notes.yml \
            "$PATCH_FILE"
          git -C main apply --binary \
            --exclude=.github/workflows/buildapp.yml \
            --exclude=.github/workflows/k4l-private-build.yml \
            --exclude=.github/workflows/k4l-release-notes.yml \
            "$PATCH_FILE"

          python3 -c "import base64,sys; sys.stdout.buffer.write(base64.b64decode(open('main/.k4l/k4l-new-files.tar.gz.b64','rb').read()))" | tar -xzf - -C main
          rm -rf main/.k4l
          git -C main diff --check

      - name: Install build dependencies
        run: brew install ldid dpkg make autoconf automake cmake libtool meson nasm ninja pkgconf wget yasm

      - name: Use GNU Make
        run: echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Set up Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: 405e5c6ddb288615c030eeaedc6b265aae748285
          path: ${{ github.workspace }}/theos
          submodules: recursive

      - name: Cache iOS SDK
        id: sdk
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos/sdks/
          key: iPhoneOS16.2.sdk

      - name: Download iOS SDK
        if: steps.sdk.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/xybp888/iOS-SDKs/
          cd iOS-SDKs
          git sparse-checkout set --no-cone iPhoneOS16.2.sdk
          git checkout
          mv *.sdk "$THEOS/sdks"
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Download decrypted Instagram input IPA
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p main/packages
          ASSET_API_URL="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/input-ipa" --jq '.assets[] | select(.name | endswith(".ipa")) | .url' | head -n 1)"
          if [ -z "$ASSET_API_URL" ]; then
            echo "::error::No decrypted Instagram IPA was found in the input-ipa release."
            exit 1
          fi
          gh api -H "Accept: application/octet-stream" "$ASSET_API_URL" > main/packages/com.burbn.instagram.ipa
          unzip -t main/packages/com.burbn.instagram.ipa >/dev/null
          ls -lh main/packages/com.burbn.instagram.ipa
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Cache FFmpeg frameworks
        id: ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            main/modules/ffmpegkit
            main/.cache/ffmpegkit
          key: ffmpegkit-${{ runner.os }}-${{ hashFiles('main/fetch-ffmpegkit.sh') }}

      - name: Prepare FFmpeg frameworks
        shell: bash
        run: |
          set -euo pipefail
          cd main
          chmod +x fetch-ffmpegkit.sh
          ./fetch-ffmpegkit.sh

      - name: Install IPA injection tools
        shell: bash
        run: |
          set -euo pipefail
          pip install --force-reinstall https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip
          curl -fL -o main/ipapatch https://github.com/asdfzxcvbn/ipapatch/releases/download/v2.1.3/ipapatch.macos-arm64
          chmod +x main/ipapatch
          echo "${{ github.workspace }}/main" >> "$GITHUB_PATH"

      - name: Build and validate K4L IPA
        shell: bash
        run: |
          set -euo pipefail
          cd main
          rm -f packages/K4L.ipa packages/*.deb packages/Sparkle*_IG_v*.ipa packages/K4L_*_IG_v*.ipa
          ./build.sh ipa --release

          OUTPUT_IPA="$(find packages -maxdepth 1 -type f -name 'K4L*_IG_v*.ipa' -print | sort | tail -n 1)"
          if [ -z "$OUTPUT_IPA" ]; then
            OUTPUT_IPA="$(find packages -maxdepth 1 -type f -name 'Sparkle*_IG_v*.ipa' -print | sort | tail -n 1)"
          fi
          if [ -z "$OUTPUT_IPA" ]; then
            echo "::error::The build completed without producing a K4L IPA."
            find packages -maxdepth 1 -type f -print
            exit 1
          fi

          unzip -t "$OUTPUT_IPA" >/dev/null
          unzip -Z1 "$OUTPUT_IPA" | grep -Eq '^Payload/[^/]+\.app/'
          cp "$OUTPUT_IPA" packages/K4L.ipa
          rm -f packages/*.deb
          unzip -t packages/K4L.ipa >/dev/null
          ls -lh "$OUTPUT_IPA" packages/K4L.ipa
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload K4L IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: K4L-IPA
          path: main/packages/K4L.ipa
          if-no-files-found: error

      - name: Publish updated K4L IPA release
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="k4l-latest"
          RELEASE_NOTES="K4L v1.2.0 for Instagram 439.0.0 with the latest gallery and media fixes. IPA-only build for Sideloadly."

          unzip -t main/packages/K4L.ipa >/dev/null

          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target main \
              --title "K4L IPA" \
              --notes "$RELEASE_NOTES"
          fi

          gh release upload "$RELEASE_TAG" main/packages/K4L.ipa \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

          gh release edit "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "K4L IPA" \
            --notes "$RELEASE_NOTES"

          RELEASE_ID="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" --jq '.id')"
          gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -f make_latest=true >/dev/null || true

          gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json tagName,name,publishedAt,url,assets
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Record K4L build result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = 'main';
            const outputPath = '.k4l-diagnostics/latest-build.json';
            const runId = Number(context.runId);

            const run = await github.rest.actions.getWorkflowRun({ owner, repo, run_id: runId });
            const jobsResponse = await github.rest.actions.listJobsForWorkflowRun({
              owner,
              repo,
              run_id: runId,
              per_page: 100
            });
            const releasesResponse = await github.rest.repos.listReleases({ owner, repo, per_page: 20 });

            const data = {
              generated_at: new Date().toISOString(),
              run: {
                id: run.data.id,
                status: run.data.status,
                conclusion: run.data.conclusion,
                head_sha: run.data.head_sha,
                html_url: run.data.html_url,
                jobs: jobsResponse.data.jobs.map(job => ({
                  id: job.id,
                  name: job.name,
                  status: job.status,
                  conclusion: job.conclusion,
                  steps: (job.steps || []).map(step => ({
                    number: step.number,
                    name: step.name,
                    status: step.status,
                    conclusion: step.conclusion
                  }))
                }))
              },
              releases: releasesResponse.data.map(release => ({
                tag_name: release.tag_name,
                name: release.name,
                published_at: release.published_at,
                assets: release.assets.map(asset => ({
                  name: asset.name,
                  size: asset.size,
                  updated_at: asset.updated_at,
                  browser_download_url: asset.browser_download_url
                }))
              }))
            };

            const body = JSON.stringify(data, null, 2) + '\n';
            let sha;
            try {
              const existing = await github.rest.repos.getContent({ owner, repo, path: outputPath, ref: branch });
              if (!Array.isArray(existing.data)) sha = existing.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path: outputPath,
              branch,
              message: `record K4L build result for run ${runId}`,
              content: Buffer.from(body).toString('base64'),
              ...(sha ? { sha } : {})
            });
