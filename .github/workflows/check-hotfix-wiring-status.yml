name: Check hotfix wiring status

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/check-hotfix-wiring-status.trigger'

permissions:
  actions: read
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, { owner, repo, per_page: 100 });
            const selected = runs.filter(run =>
              run.path === '.github/workflows/wire-ios27-photos-hotfix.yml' ||
              run.path === '.github/workflows/check-hotfix-wiring-status.yml'
            ).slice(0, 20);
            const output = [];
            for (const run of selected) {
              const jobs = await github.rest.actions.listJobsForWorkflowRun({ owner, repo, run_id: run.id, per_page: 100 });
              output.push({
                id: run.id,
                name: run.name,
                path: run.path,
                status: run.status,
                conclusion: run.conclusion,
                head_sha: run.head_sha,
                html_url: run.html_url,
                jobs: jobs.data.jobs.map(job => ({
                  id: job.id,
                  name: job.name,
                  status: job.status,
                  conclusion: job.conclusion,
                  steps: (job.steps || []).map(step => ({ name: step.name, status: step.status, conclusion: step.conclusion }))
                }))
              });
            }
            const body = JSON.stringify({ generated_at: new Date().toISOString(), runs: output }, null, 2) + '\n';
            let sha;
            try {
              const current = await github.rest.repos.getContent({ owner, repo, path: '.k4l-diagnostics/hotfix-wiring-status.json', ref: 'main' });
              if (!Array.isArray(current.data)) sha = current.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path: '.k4l-diagnostics/hotfix-wiring-status.json', branch: 'main',
              message: 'record hotfix wiring workflow status',
              content: Buffer.from(body).toString('base64'),
              ...(sha ? { sha } : {})
            });

      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            for (const path of ['.github/workflows/check-hotfix-wiring-status.yml', '.github/workflows/check-hotfix-wiring-status.trigger']) {
              try {
                const response = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
                if (!Array.isArray(response.data)) {
                  await github.rest.repos.deleteFile({ owner, repo, path, branch: 'main', sha: response.data.sha, message: 'remove temporary hotfix wiring status check' });
                }
              } catch (error) {
                if (error.status !== 404) core.warning(`${path}: ${error.message}`);
              }
            }
