name: Diagnose current K4L fix patches

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/diagnose-current-fix-patches.trigger'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          submodules: recursive

      - name: Check each fix patch
        shell: bash
        run: |
          set -euo pipefail
          PATCH_FILE="$RUNNER_TEMP/k4l-changes.patch"
          OUT="$RUNNER_TEMP/current-fix-patches.txt"
          python3 -c "import base64,sys; sys.stdout.buffer.write(base64.b64decode(open('.k4l/k4l-changes.patch.gz.b64','rb').read()))" | gzip -dc > "$PATCH_FILE"
          git apply --binary \
            --exclude=.github/workflows/buildapp.yml \
            --exclude=.github/workflows/k4l-private-build.yml \
            --exclude=.github/workflows/k4l-release-notes.yml \
            "$PATCH_FILE"
          python3 -c "import base64,sys; sys.stdout.buffer.write(base64.b64decode(open('.k4l/k4l-new-files.tar.gz.b64','rb').read()))" | tar -xzf - -C .

          set +e
          {
            echo '=== PHOTOS PATCH ==='
            git apply --recount --check --verbose .k4l/k4l-ios27-photos-hotfix.patch
            echo "PHOTOS_EXIT=$?"
            echo
            echo '=== TESTFLIGHT PATCH ==='
            git apply --recount --check --verbose .k4l-diagnostics/pending-testflight-popup-fix.patch
            echo "TESTFLIGHT_EXIT=$?"
          } > "$OUT" 2>&1
          set -e

      - name: Store patch diagnostics
        uses: actions/github-script@v7
        env:
          OUT_PATH: ${{ runner.temp }}/current-fix-patches.txt
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const path = '.k4l-diagnostics/current-fix-patches.txt';
            const body = fs.readFileSync(process.env.OUT_PATH);
            let sha;
            try {
              const existing = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
              if (!Array.isArray(existing.data)) sha = existing.data.sha;
            } catch (error) { if (error.status !== 404) throw error; }
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path, branch: 'main',
              message: 'record current fix patch diagnostics',
              content: body.toString('base64'),
              ...(sha ? { sha } : {})
            });

      - name: Remove one-time diagnostics
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            for (const path of ['.github/workflows/diagnose-current-fix-patches.yml', '.github/workflows/diagnose-current-fix-patches.trigger']) {
              try {
                const response = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
                if (!Array.isArray(response.data)) await github.rest.repos.deleteFile({ owner, repo, path, branch: 'main', sha: response.data.sha, message: 'remove current fix patch diagnostics' });
              } catch (error) { if (error.status !== 404) core.warning(`${path}: ${error.message}`); }
            }
