name: Diagnose K4L gallery actions

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/diagnose-gallery-actions.trigger'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trace gallery share and download actions
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .k4l-diagnostics
          OUT=.k4l-diagnostics/gallery-actions.txt
          {
            echo '=== GALLERY FILES ==='
            find src -type f \( -iname '*Gallery*' -o -iname '*Preview*' -o -iname '*Viewer*' \) | sort
            echo
            echo '=== ACTION MATCHES ==='
            grep -RInE --include='*.m' --include='*.mm' --include='*.xm' --include='*.x' --include='*.h' \
              'Download Video|Save Video|UIActivityViewController|showShareVC|PHPhotoLibrary|creationRequestForAsset|addResourceWithType|shareTapped|downloadTapped|saveTapped|activityViewController' \
              src || true
          } > "$OUT"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$OUT"
          git commit -m 'record K4L gallery action diagnostics'
          git push

      - name: Remove one-time diagnostic files
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = 'main';
            for (const path of [
              '.github/workflows/diagnose-gallery-actions.yml',
              '.github/workflows/diagnose-gallery-actions.trigger'
            ]) {
              try {
                const response = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                if (!Array.isArray(response.data)) {
                  await github.rest.repos.deleteFile({
                    owner, repo, path, branch,
                    sha: response.data.sha,
                    message: 'remove one-time gallery diagnostics'
                  });
                }
              } catch (error) {
                if (error.status !== 404) core.warning(`${path}: ${error.message}`);
              }
            }
