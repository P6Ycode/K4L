name: Check live K4L build status

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/k4l-live-status.trigger'

permissions:
  actions: read
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Record live K4L workflow status
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = 'main';
            const outputPath = '.k4l-diagnostics/live-status.json';

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              { owner, repo, per_page: 100 }
            );

            const matching = runs
              .filter(run => run.path === '.github/workflows/k4l-private-build.yml')
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
              .slice(0, 5);

            const details = [];
            for (const run of matching) {
              const response = await github.rest.actions.listJobsForWorkflowRun({
                owner,
                repo,
                run_id: run.id,
                per_page: 100
              });
              details.push({
                id: run.id,
                status: run.status,
                conclusion: run.conclusion,
                head_sha: run.head_sha,
                created_at: run.created_at,
                updated_at: run.updated_at,
                html_url: run.html_url,
                jobs: response.data.jobs.map(job => ({
                  id: job.id,
                  name: job.name,
                  status: job.status,
                  conclusion: job.conclusion,
                  steps: (job.steps || []).map(step => ({
                    number: step.number,
                    name: step.name,
                    status: step.status,
                    conclusion: step.conclusion
                  }))
                }))
              });
            }

            const body = JSON.stringify({ generated_at: new Date().toISOString(), runs: details }, null, 2) + '\n';
            let sha;
            try {
              const existing = await github.rest.repos.getContent({ owner, repo, path: outputPath, ref: branch });
              if (!Array.isArray(existing.data)) sha = existing.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path: outputPath,
              branch,
              message: 'record live K4L build status',
              content: Buffer.from(body).toString('base64'),
              ...(sha ? { sha } : {})
            });

      - name: Remove temporary live-status files
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = 'main';
            for (const path of ['.github/workflows/k4l-live-status.yml', '.github/workflows/k4l-live-status.trigger']) {
              try {
                const current = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                if (Array.isArray(current.data)) continue;
                await github.rest.repos.deleteFile({ owner, repo, path, branch, sha: current.data.sha, message: 'remove temporary K4L live-status check' });
              } catch (error) {
                if (error.status !== 404) core.warning(error.message);
              }
            }
