name: Diagnose iOS 27 hotfix patch

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/diagnose-ios27-hotfix-patch.trigger'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: recursive

      - name: Check hotfix patch against built source
        shell: bash
        run: |
          set -euo pipefail
          PATCH_FILE="$RUNNER_TEMP/k4l-changes.patch"
          python3 -c "import base64,sys; sys.stdout.buffer.write(base64.b64decode(open('.k4l/k4l-changes.patch.gz.b64','rb').read()))" | gzip -dc > "$PATCH_FILE"
          git apply --binary \
            --exclude=.github/workflows/buildapp.yml \
            --exclude=.github/workflows/k4l-private-build.yml \
            --exclude=.github/workflows/k4l-release-notes.yml \
            "$PATCH_FILE"
          python3 -c "import base64,sys; sys.stdout.buffer.write(base64.b64decode(open('.k4l/k4l-new-files.tar.gz.b64','rb').read()))" | tar -xzf - -C .
          mkdir -p .k4l-diagnostics
          set +e
          git apply --check --verbose .k4l/k4l-ios27-photos-hotfix.patch > .k4l-diagnostics/ios27-hotfix-apply.txt 2>&1
          CODE=$?
          set -e
          printf '\nEXIT_CODE=%s\n' "$CODE" >> .k4l-diagnostics/ios27-hotfix-apply.txt
          git reset --hard HEAD
          git clean -fd -e .k4l-diagnostics/
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .k4l-diagnostics/ios27-hotfix-apply.txt
          git commit -m 'record iOS 27 hotfix patch diagnostics'
          git pull --rebase origin main
          git push origin main

      - name: Remove one-time diagnostic files
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            for (const path of ['.github/workflows/diagnose-ios27-hotfix-patch.yml', '.github/workflows/diagnose-ios27-hotfix-patch.trigger']) {
              try {
                const response = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
                if (!Array.isArray(response.data)) await github.rest.repos.deleteFile({ owner, repo, path, branch: 'main', sha: response.data.sha, message: 'remove iOS 27 hotfix patch diagnostics' });
              } catch (error) { if (error.status !== 404) core.warning(`${path}: ${error.message}`); }
            }
