name: Normalize iOS 27 hotfix patch

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/normalize-ios27-hotfix-patch.trigger'

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: recursive

      - name: Regenerate a valid hotfix patch
        shell: bash
        run: |
          set -euo pipefail
          PATCH_FILE="$RUNNER_TEMP/k4l-changes.patch"
          OUTPUT_PATCH="$RUNNER_TEMP/k4l-ios27-photos-hotfix.patch"
          python3 -c "import base64,sys; sys.stdout.buffer.write(base64.b64decode(open('.k4l/k4l-changes.patch.gz.b64','rb').read()))" | gzip -dc > "$PATCH_FILE"
          git apply --binary \
            --exclude=.github/workflows/buildapp.yml \
            --exclude=.github/workflows/k4l-private-build.yml \
            --exclude=.github/workflows/k4l-release-notes.yml \
            "$PATCH_FILE"
          python3 -c "import base64,sys; sys.stdout.buffer.write(base64.b64decode(open('.k4l/k4l-new-files.tar.gz.b64','rb').read()))" | tar -xzf - -C .

          git config user.name 'K4L Patch Builder'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'temporary post-K4L patch baseline'

          git apply --recount .k4l/k4l-ios27-photos-hotfix.patch
          git diff --binary HEAD -- \
            src/Shared/Downloads/SPKDownloadDestinationWriter.h \
            src/Shared/Downloads/SPKDownloadDestinationWriter.m \
            src/Shared/Gallery/SPKGalleryViewController.m \
            src/Shared/MediaPreview/SPKFullScreenMediaPlayer.m > "$OUTPUT_PATCH"

          test -s "$OUTPUT_PATCH"
          git reset --hard HEAD
          git apply --check --binary "$OUTPUT_PATCH"
          cp "$OUTPUT_PATCH" "$RUNNER_TEMP/validated-ios27-hotfix.patch"

      - name: Store normalized hotfix patch
        uses: actions/github-script@v7
        env:
          PATCH_PATH: ${{ runner.temp }}/validated-ios27-hotfix.patch
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const path = '.k4l/k4l-ios27-photos-hotfix.patch';
            const current = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
            if (Array.isArray(current.data)) throw new Error('Expected hotfix patch file');
            const content = fs.readFileSync(process.env.PATCH_PATH);
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path, branch: 'main', sha: current.data.sha,
              message: 'normalize iOS 27 Photos hotfix patch',
              content: content.toString('base64')
            });

      - name: Remove one-time normalization files
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            for (const path of ['.github/workflows/normalize-ios27-hotfix-patch.yml', '.github/workflows/normalize-ios27-hotfix-patch.trigger']) {
              try {
                const response = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
                if (!Array.isArray(response.data)) await github.rest.repos.deleteFile({ owner, repo, path, branch: 'main', sha: response.data.sha, message: 'remove iOS 27 hotfix patch normalization' });
              } catch (error) { if (error.status !== 404) core.warning(`${path}: ${error.message}`); }
            }
