name: Clean workflow run history

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/cleanup-workflow-history.trigger'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete completed non-successful runs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const currentRunId = Number(context.runId);

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              { owner, repo, per_page: 100 }
            );

            const deletableRuns = runs.filter(run =>
              Number(run.id) !== currentRunId &&
              run.status === 'completed' &&
              run.conclusion !== 'success'
            );

            let deleted = 0;
            for (const run of deletableRuns) {
              try {
                await github.rest.actions.deleteWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id
                });
                deleted += 1;
                core.notice(`Deleted ${run.conclusion} run ${run.id}: ${run.name}`);
              } catch (error) {
                core.warning(`Could not delete run ${run.id}: ${error.message}`);
              }
            }

            core.notice(`Deleted ${deleted} completed non-successful workflow run(s). Successful and active runs were preserved.`);

      - name: Remove one-time cleanup files
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = 'main';
            const paths = [
              '.github/workflows/cleanup-workflow-history.yml',
              '.github/workflows/cleanup-workflow-history.trigger'
            ];

            for (const path of paths) {
              try {
                const response = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path,
                  ref: branch
                });

                if (Array.isArray(response.data)) {
                  core.warning(`Expected a file but found a directory at ${path}.`);
                  continue;
                }

                await github.rest.repos.deleteFile({
                  owner,
                  repo,
                  path,
                  branch,
                  sha: response.data.sha,
                  message: 'remove one-time workflow history cleanup'
                });
                core.notice(`Removed ${path}.`);
              } catch (error) {
                if (error.status === 404) {
                  core.notice(`${path} is already removed.`);
                } else {
                  core.warning(`Could not remove ${path}: ${error.message}`);
                }
              }
            }
