name: Wire iOS 27 Photos hotfix

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/wire-ios27-photos-hotfix.trigger'

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply hotfix from the main IPA workflow
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/k4l-private-build.yml')
          text = path.read_text()
          hotfix = "          git -C main apply --check --binary .k4l/k4l-ios27-photos-hotfix.patch\n          git -C main apply --binary .k4l/k4l-ios27-photos-hotfix.patch\n"
          marker = "          rm -rf main/.k4l\n"
          if hotfix not in text:
              if marker not in text:
                  raise SystemExit('Could not find the .k4l cleanup marker')
              path.write_text(text.replace(marker, hotfix + marker, 1))
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/k4l-private-build.yml
          if ! git diff --cached --quiet; then
            git commit -m 'apply iOS 27 Photos hotfix in IPA builds'
            git push
          fi

      - name: Remove one-time wiring files
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = 'main';
            for (const path of [
              '.github/workflows/wire-ios27-photos-hotfix.yml',
              '.github/workflows/wire-ios27-photos-hotfix.trigger'
            ]) {
              try {
                const response = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                if (!Array.isArray(response.data)) {
                  await github.rest.repos.deleteFile({ owner, repo, path, branch, sha: response.data.sha, message: 'remove one-time iOS 27 hotfix wiring' });
                }
              } catch (error) {
                if (error.status !== 404) core.warning(`${path}: ${error.message}`);
              }
            }
