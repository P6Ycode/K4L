name: Extract K4L failure log

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/extract-k4l-failure.trigger'

permissions:
  actions: read
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    env:
      FAILED_JOB_ID: '89251891200'
      OUTPUT_PATH: '.k4l-diagnostics/failure-log.txt'
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download and save failing log section
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/actions/jobs/$FAILED_JOB_ID/logs" > /tmp/k4l-job.log

          {
            echo "K4L failed job: $FAILED_JOB_ID"
            echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "=== ERROR MATCHES ==="
            grep -nEi '(^|[^a-z])(error|fatal|failed|failure|exception|undefined|not found|no such file|process completed)([^a-z]|$)' /tmp/k4l-job.log | tail -n 120 || true
            echo
            echo "=== FINAL 450 LOG LINES ==="
            tail -n 450 /tmp/k4l-job.log
          } > /tmp/failure-log.txt

          CONTENT="$(base64 -w 0 /tmp/failure-log.txt)"
          EXISTING_SHA="$(gh api "repos/$GITHUB_REPOSITORY/contents/$OUTPUT_PATH?ref=main" --jq '.sha' 2>/dev/null || true)"

          if [ -n "$EXISTING_SHA" ]; then
            gh api --method PUT "repos/$GITHUB_REPOSITORY/contents/$OUTPUT_PATH" \
              -f message='record K4L failed build log' \
              -f content="$CONTENT" \
              -f sha="$EXISTING_SHA" \
              -f branch='main' >/dev/null
          else
            gh api --method PUT "repos/$GITHUB_REPOSITORY/contents/$OUTPUT_PATH" \
              -f message='record K4L failed build log' \
              -f content="$CONTENT" \
              -f branch='main' >/dev/null
          fi

      - name: Remove temporary extractor files
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = 'main';
            for (const path of [
              '.github/workflows/extract-k4l-failure.yml',
              '.github/workflows/extract-k4l-failure.trigger'
            ]) {
              try {
                const current = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                if (Array.isArray(current.data)) continue;
                await github.rest.repos.deleteFile({
                  owner,
                  repo,
                  path,
                  branch,
                  sha: current.data.sha,
                  message: 'remove temporary K4L failure-log extractor'
                });
              } catch (error) {
                if (error.status !== 404) core.warning(error.message);
              }
            }
