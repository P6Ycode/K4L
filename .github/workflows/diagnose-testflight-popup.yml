name: Diagnose TestFlight popup

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/diagnose-testflight-popup.trigger'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: k4l

      - name: Compare K4L and upstream popup hooks
        shell: bash
        run: |
          set -euo pipefail
          git clone --quiet --depth 1 --branch v1.1.0 https://github.com/efibalogh/sparkle-ig.git upstream
          OUT="$RUNNER_TEMP/testflight-popup-report.txt"
          {
            echo '=== UPSTREAM v1.1.0 MATCHES ==='
            grep -RInE --include='*.m' --include='*.mm' --include='*.xm' --include='*.x' --include='*.h' --include='*.plist' \
              'TestFlight|testflight|beta.*popup|popup.*beta|hide.*test|suppress.*test' upstream/src upstream 2>/dev/null | head -n 300 || true
            echo
            echo '=== K4L REPOSITORY MATCHES ==='
            grep -RInE --include='*.m' --include='*.mm' --include='*.xm' --include='*.x' --include='*.h' --include='*.plist' \
              'TestFlight|testflight|beta.*popup|popup.*beta|hide.*test|suppress.*test' k4l/src k4l 2>/dev/null | head -n 300 || true
            echo
            echo '=== UPSTREAM RELEVANT FILE CONTENT ==='
            files=$(grep -RIlE --include='*.m' --include='*.mm' --include='*.xm' --include='*.x' --include='*.h' --include='*.plist' \
              'TestFlight|testflight|beta.*popup|popup.*beta|hide.*test|suppress.*test' upstream/src upstream 2>/dev/null | head -n 30 || true)
            for file in $files; do
              echo "--- $file"
              sed -n '1,260p' "$file"
            done
            echo
            echo '=== K4L RELEVANT FILE CONTENT ==='
            files=$(grep -RIlE --include='*.m' --include='*.mm' --include='*.xm' --include='*.x' --include='*.h' --include='*.plist' \
              'TestFlight|testflight|beta.*popup|popup.*beta|hide.*test|suppress.*test' k4l/src k4l 2>/dev/null | head -n 30 || true)
            for file in $files; do
              echo "--- $file"
              sed -n '1,260p' "$file"
            done
          } > "$OUT"

      - name: Store diagnostic report
        uses: actions/github-script@v7
        env:
          REPORT_PATH: ${{ runner.temp }}/testflight-popup-report.txt
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const path = '.k4l-diagnostics/testflight-popup-report.txt';
            const body = fs.readFileSync(process.env.REPORT_PATH);
            let sha;
            try {
              const existing = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
              if (!Array.isArray(existing.data)) sha = existing.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path, branch: 'main',
              message: 'record TestFlight popup diagnostics',
              content: body.toString('base64'),
              ...(sha ? { sha } : {})
            });

      - name: Remove one-time diagnostic files
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            for (const path of [
              '.github/workflows/diagnose-testflight-popup.yml',
              '.github/workflows/diagnose-testflight-popup.trigger'
            ]) {
              try {
                const response = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
                if (!Array.isArray(response.data)) {
                  await github.rest.repos.deleteFile({ owner, repo, path, branch: 'main', sha: response.data.sha, message: 'remove TestFlight popup diagnostics' });
                }
              } catch (error) {
                if (error.status !== 404) core.warning(`${path}: ${error.message}`);
              }
            }
