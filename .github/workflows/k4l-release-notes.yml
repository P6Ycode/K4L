name: Update private K4L release notes

on:
  push:
    branches:
      - k4l-custom
    paths:
      - '.release-notes/**'

jobs:
  notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Wait for K4L release and update notes
        shell: bash
        run: |
          for attempt in $(seq 1 90); do
            if gh release view k4l-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              break
            fi
            sleep 20
          done
          gh release view k4l-latest --repo "$GITHUB_REPOSITORY" >/dev/null
          cat > /tmp/k4l-release-notes.md <<'NOTES'
          # K4L v1.2.0 — Instagram 439.0.0
          
          ## K4L additions
          
          - Red-and-black **K4L** branding: red K, black 4, red L, with dark-mode contrast.
          - The iPhone home-screen app name remains **Instagram**.
          - **Recent Activity** is the default tap action on another person's profile.
          - Manual **Scan Now** and pull-to-refresh profile scans.
          - First scan creates a baseline; later scans detect:
            - People who followed or unfollowed the profile.
            - People the profile started following or unfollowed.
          - Activity entries include display name, username, avatar, and detection timestamp.
          - Scans work with public profiles and private profiles the signed-in account can access.
          - Recent Activity data stays local and is capped at 13,000 total connections to reduce rate-limit risk.
          - Exact posted date and time on every active story.
          - Live HH:MM:SS countdown until each active story expires.
          - Highlights show their original posted time and no expiration.
          - Blue update dot under a highlight containing unseen new items; it clears after viewing and returns after another update.
          - Anonymous viewing is enabled by default for accessible public, private, and Close Friends stories and highlights.
          
          ## K4L download and quality improvements
          
          - Highest official Instagram photo CDN variant for posts, stories, highlights, and reels.
          - Highest available official video stream plus best available audio stream.
          - Full-quality photos, videos, and photo-style reels.
          - Mixed photo/video carousel support.
          - **Download All** for complete carousels.
          - **Select Media** for downloading only chosen carousel items.
          - Original carousel order is preserved.
          - Per-item progress, retry, and failure handling.
          - DASH video/audio is merged using stream-copy first, preserving original bytes, frame rate, aspect ratio, duration, and quality when MP4 supports the codecs.
          - Conversion is used only when the selected official streams cannot be placed directly into MP4.
          - No added K4L watermark.
          
          ## Retained action-button and media features
          
          - Configurable action buttons for Feed, Reels, Stories, Profiles, Messages, and Instants.
          - Configurable default tap action and long-press action menus.
          - Editable menu sections, icons, order, names, and collapsible behavior.
          - Save to Photos, Share, Copy Media, Copy Link, Save to K4L Gallery, Expand, Trim & Save, and Edit & Save.
          - Audio extraction/download, sharing, Gallery saving, playback, and URL copying where audio is available.
          - Full-screen photo/video/audio previews.
          - Long-press feed and profile media expansion.
          - Video and audio trimming with filmstrip/waveform controls.
          - Photo cropping, rotation, flipping, and aspect-ratio editing.
          - Native Live Text selection on supported static images.
          
          ## Retained private K4L Gallery
          
          - Private on-device Gallery with images, videos, audio, folders, favorites, metadata, search, sorting, and filtering.
          - Grid/list layouts, adjustable grid density, source labels, usernames, and durations.
          - Open the original Story, Reel, Post, or Profile from saved media.
          - Rename, move, share, trim, edit, favorite, and delete Gallery items.
          - Optional Gallery passcode plus Face ID or Touch ID.
          - Per-account Gallery filtering and account reassignment.
          - Hidden-source filters, duplicate tracking, storage totals, and bulk deletion.
          - Quick Gallery access from a configurable Instagram tab.
          
          ## Retained download manager
          
          - Download queue with All, Active, Queued, Failed, and Recent filters.
          - Multi-item job expansion and individual-item retry.
          - Aggregate download progress pill.
          - Duplicate-download detection.
          - One to four parallel downloads.
          - Configurable download-history limit and staged previews.
          - Enhanced media resolution and selectable photo/video quality.
          - Advanced encoding codec, bitrate, CRF, preset, resolution, and audio controls.
          - FFmpeg encoding logs.
          - Audio page download button and configurable audio action.
          
          ## Retained story features
          
          - Story action button and configurable menu.
          - Manual seen mode with eye button.
          - Per-account Included and Excluded user lists for seen receipts.
          - Mark seen on like or reply.
          - Stop automatic story advance.
          - Advance after eye button, like, or reply.
          - Confirm story like, quick reaction, and sticker interaction.
          - Unlock Story Preview without appearing on the viewer list where supported.
          - Hide the viewer-list Plus button.
          - Search your story viewer list with relationship filters.
          - Hide story midcards such as Join a Trending and Add Yours.
          - Show story mentions and poll vote counts.
          - Detailed story text color picker.
          
          ## Retained feed and reels features
          
          - Feed and Reels action buttons.
          - Configurable Feed header shortcut to Settings, Profile Analyzer, Gallery, Deleted Messages, or Downloads.
          - For You or chronological Following feed.
          - Hide feed/reels ads, shopping prompts, suggested posts, suggested reels, suggested accounts, suggested Threads, story tray, or the entire feed.
          - Hide feed/reels headers, repost buttons, and engagement counts.
          - Disable feed video autoplay and start expanded videos muted.
          - Disable Home-tab refresh or background feed refresh.
          - Reels tap controls, progress scrubber, auto-unmute control, and tab-refresh control.
          - Confirm likes, double-taps, reposts, reel refresh, and posting comments.
          - Swipe to close comments, copy comment text/media, download photo/GIF comments, hide comment commerce/Gifts, and upload a Gallery photo in comments.
          
          ## Retained Messages and privacy features
          
          - Message action button for visual and permanent chat media.
          - Manual chat-seen mode with movable eye button.
          - Included and Excluded chat lists plus mark-seen triggers.
          - Keep remotely deleted messages visible.
          - Deleted-message and removed-reaction log.
          - Media recovery cache for unsent view-once/view-twice photos, videos, GIFs, and stickers.
          - Self-refreshing cached profile pictures.
          - Confirm Inbox refresh before preserved content can be dropped.
          - Exact Last Active date/time formatting.
          - Hide typing status, Reels Blend, audio call, video call, suggested chats, Notes tray, or Friends Map.
          - Disable view-once restrictions and screenshot detection for visual messages.
          - Disable Vanish Mode swipe-up and screenshot detection.
          - Download Notes audio and copy Note text.
          - Download, upload, and trim voice/audio messages.
          - Send a K4L Gallery photo into a chat.
          - Confirm calls, reactions, voice messages, follow requests, theme changes, double-taps, and Vanish Mode.
          
          ## Retained Instants features
          
          - Instants action button with photo/video and multi-item support.
          - Screenshot and screen-recording bypass.
          - Disable Instants creation.
          - Skip the camera after viewing the final Instant.
          - Disable Camera Control capture.
          - Upload to Instants from Photos, Files, or K4L Gallery.
          - Confirm Instant reactions.
          
          ## Retained profile and analyzer features
          
          - Profile action button with copy ID, username, name, biography, and profile link actions.
          - View, share, save, or expand profile pictures.
          - Following-you indicator with icon/text and optional color.
          - Hide profile Notes bubble or Threads button.
          - Confirm follow and unfollow.
          - Original self Profile Analyzer:
            - Mutual followers.
            - Not following you back.
            - People you do not follow back.
            - New/lost followers.
            - Your following/unfollowing history.
            - Username, name, and profile-photo changes.
            - Search, sorting, profile opening, and inline follow/unfollow.
          - Locally tracked visited profiles with visit counts and timestamps.
          
          ## Retained interface, privacy, and utility features
          
          - Per-account K4L settings.
          - Hide ads across Feed, Stories, Reels, and Explore.
          - Hide Meta AI across Direct, Explore/Search, comments, creation tools, and global UI.
          - Hide suggested users across multiple surfaces.
          - Copy text, remove tracking from shared links, hold Share to copy links, and stop recent-search storage.
          - Configurable launch tab, tab order, tab swiping, and hidden tabs.
          - Explore-grid and trending-search hiding.
          - Open an Instagram clipboard link by long-pressing Explore.
          - Hide K4L overlays from screenshots, recordings, and mirroring.
          - iOS 26 Liquid Glass support, progressive blur, and floating-tab behavior.
          - Alternate app icons, configurable action-menu icon, haptic controls, and cache clearing.
          - Configurable K4L notification appearance, haptics, duration, and per-feature visibility.
          - Quick settings access, master disable switch, onboarding/What's New replay, safe-start reset, Settings passcode with Face ID/Touch ID, TestFlight-popup hiding, duplicate-notification fix, and Instagram safe-mode control.
          - Storage usage by feature.
          - Export/import of Settings, Gallery, Deleted Messages, and Profile Analyzer data.
          - Full or per-account settings reset.
          
          ## How the main features work

          ### Recent Activity

          Open another person's profile and tap the K4L profile action button. **Recent Activity** opens by default. Tap **Scan Now** or pull down to refresh. The first scan saves a local baseline and intentionally reports no changes. Every later manual scan compares the current followers/following lists with the prior scan and creates dated follow/unfollow entries. The displayed time is when K4L detected the change, not an exact Instagram event time.

          ### Action buttons

          A normal tap runs the default action selected for that surface. A long press opens the full menu. **Configure Actions** lets you reorder actions, move them between sections, rename sections, select icons, collapse sections, or disable actions. Feed, Reels, Stories, Profiles, Messages, and Instants each have their own configuration.

          ### Full-quality downloads

          For a photo, K4L compares Instagram's official image candidates and selects the largest available dimensions. For video, it selects the best official video representation and audio representation. When Instagram serves video and audio separately, K4L downloads both and first tries to combine them without re-encoding. If their codecs cannot be stored directly in MP4, K4L converts them using the configured encoding settings.

          ### Carousel and batch downloads

          **Download All** saves every downloadable item in its original carousel order. **Select Media** opens a grid where individual photos and videos can be selected before choosing Photos, Gallery, Share, Copy, or another enabled destination. The Downloads page shows the overall job and each item's progress; failed items can be retried separately.

          ### Anonymous stories and highlights

          K4L blocks Instagram's automatic seen-receipt callback while manual-seen mode applies. Public, accessible private, and Close Friends stories can therefore be watched without automatically entering the viewer list. The eye button deliberately marks the current story seen when wanted. Included/Excluded user lists can restore normal behavior for selected accounts.

          ### Story timestamps

          The overlay reads the current story's original Instagram timestamp and displays it in local date/time format. Active stories also receive a live countdown calculated from their expiration timestamp or standard 24-hour lifetime. Highlight items keep their original posted time and show that they do not expire.

          ### Highlight update dot

          K4L reads Instagram's unseen state for each profile highlight. A blue dot is drawn beneath a highlight with new unseen items. Instagram's seen state clears the dot after those new items are viewed, and another highlight update makes it return.

          ### K4L Gallery

          Saving to **Gallery** stores a private local copy inside Instagram's app data rather than the system Photos library. Gallery folders, favorites, metadata, editing, trimming, search, sorting, passcode/biometric lock, and account filters organize those copies. Deleting a Gallery item deletes that local Gallery copy; it does not delete the original Instagram post.

          ### Download manager

          Each download action becomes one history row. The manager shows active, queued, failed, and recent jobs, limits parallel work, retains a staged preview, detects known duplicates, and allows retry or cancellation. Clearing finished history removes staged K4L download data but does not remove media already saved to Photos or Gallery.

          ### Deleted-message recovery

          When enabled, K4L snapshots message metadata before Instagram removes an unsent message. **Keep Deleted Messages** leaves a marked copy in the thread when possible, while **Deleted Messages Log** stores a browsable local history. The media recovery cache temporarily preserves supported ephemeral media so an unsent item can still be recovered. Nothing is uploaded by K4L.

          ### Original Profile Analyzer

          The analyzer scans the signed-in account's followers and following lists, stores local snapshots, and calculates mutuals, accounts not following back, accounts you do not follow back, follower gains/losses, following changes, and profile updates. Searches, sorting, profile opening, and inline follow/unfollow are available from its lists. The 13,000-connection limit reduces Instagram rate-limit risk.

          ### Message seen controls

          Manual chat-seen mode prevents automatic read receipts for selected chats and adds an eye control. The control can sit in the navigation bar or above the composer. Optional triggers mark seen when sending, replying, reacting, or typing. Included/Excluded chat lists set exceptions per Instagram account.

          ### Visual-message and screenshot controls

          View-once limitations can be relaxed so supported visual messages behave like ordinary viewer items. Screenshot-detection switches suppress Instagram's capture callbacks for visual messages, Vanish Mode, or Instants where the corresponding option is enabled.

          ### Editing and trimming

          **Edit & Save** downloads the selected photo and opens crop, rotate, flip, and aspect tools before choosing a destination. **Trim & Save** opens video filmstrip controls or an audio waveform, renders only the selected range, and then saves or shares the result. Editing a Gallery item can replace the local original or create a copy depending on Gallery settings.

          ### Per-account settings and local data

          With per-account settings enabled, each logged-in Instagram account receives its own K4L preferences and applicable history. Gallery, Deleted Messages, Profile Analyzer, Recent Activity, cached profile pictures, and download data remain inside Instagram's local app container. Export/Import creates a ZIP backup of the selected K4L data.

          ### Interface and safety tools

          Tab controls choose the launch tab, tab order, swipe behavior, and visible tabs. Liquid Glass options use Instagram/iOS presentation APIs where available. **Hide UI on Capture** removes K4L overlay controls from captured output. The master disable and safe-start controls provide recovery if an optional hook causes launch problems.

          ## Removed from K4L
          
          - Disable Scrolling Reels.
          - Prevent Doom Scrolling.
          - Doom Scrolling Limit.
          
          ## Compatibility and packaging
          
          - Built from decrypted Instagram **439.0.0**.
          - Intended for iPhone 15 Pro on iOS 26.1 and iPhone 16 Pro Max on iOS 27 beta 4.
          - Packaged as **K4L.ipa** for Sideloadly.
          - Two encrypted Instagram Camera Control extensions are removed during packaging because they cannot be re-signed.
          - Other Instagram extensions are preserved.
          - The source remains based on Sparkle and retains its GPLv3 licensing/credit.
          
          ## Recent Activity accuracy
          
          Instagram does not provide the exact moment somebody followed or unfollowed. K4L records when the change was detected and the interval between two manual scans. It cannot inspect lists the signed-in account is not permitted to access.
          NOTES
          gh release edit k4l-latest --repo "$GITHUB_REPOSITORY" --notes-file /tmp/k4l-release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}
