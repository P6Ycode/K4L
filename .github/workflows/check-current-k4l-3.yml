name: Check current K4L build 3

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/check-current-k4l-3.trigger'

permissions:
  actions: read
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, { owner, repo, per_page: 100 });
            const selected = runs.filter(run => run.path === '.github/workflows/k4l-private-build.yml').slice(0, 5);
            const output = [];
            for (const run of selected) {
              const jobs = await github.rest.actions.listJobsForWorkflowRun({ owner, repo, run_id: run.id, per_page: 100 });
              output.push({ id: run.id, status: run.status, conclusion: run.conclusion, head_sha: run.head_sha, html_url: run.html_url, jobs: jobs.data.jobs.map(job => ({ id: job.id, name: job.name, status: job.status, conclusion: job.conclusion, steps: job.steps || [] })) });
            }
            const body = JSON.stringify({ generated_at: new Date().toISOString(), runs: output }, null, 2) + '\n';
            let sha;
            try {
              const existing = await github.rest.repos.getContent({ owner, repo, path: '.k4l-diagnostics/current-build-3.json', ref: 'main' });
              if (!Array.isArray(existing.data)) sha = existing.data.sha;
            } catch (error) { if (error.status !== 404) throw error; }
            await github.rest.repos.createOrUpdateFileContents({ owner, repo, path: '.k4l-diagnostics/current-build-3.json', branch: 'main', message: 'record current K4L build status 3', content: Buffer.from(body).toString('base64'), ...(sha ? { sha } : {}) });

      - if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            for (const path of ['.github/workflows/check-current-k4l-3.yml', '.github/workflows/check-current-k4l-3.trigger']) {
              try {
                const current = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
                if (!Array.isArray(current.data)) await github.rest.repos.deleteFile({ owner, repo, path, branch: 'main', sha: current.data.sha, message: 'remove current K4L build status check 3' });
              } catch (error) { if (error.status !== 404) core.warning(`${path}: ${error.message}`); }
            }
