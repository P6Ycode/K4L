name: Snapshot K4L run status

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/k4l-run-diagnostics.trigger'

permissions:
  actions: read
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Record latest K4L runs and releases
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = 'main';
            const outputPath = '.k4l-diagnostics/latest-run.json';

            const allRuns = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              { owner, repo, per_page: 100 }
            );

            const selectedRuns = allRuns
              .filter(run => [
                '.github/workflows/k4l-private-build.yml',
                '.github/workflows/buildapp.yml'
              ].includes(run.path))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
              .slice(0, 10);

            const runDetails = [];
            for (const run of selectedRuns) {
              let jobs = [];
              try {
                const response = await github.rest.actions.listJobsForWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                  per_page: 100
                });
                jobs = response.data.jobs.map(job => ({
                  id: job.id,
                  name: job.name,
                  status: job.status,
                  conclusion: job.conclusion,
                  steps: (job.steps || []).map(step => ({
                    number: step.number,
                    name: step.name,
                    status: step.status,
                    conclusion: step.conclusion
                  }))
                }));
              } catch (error) {
                jobs = [{ error: error.message }];
              }

              runDetails.push({
                id: run.id,
                name: run.name,
                path: run.path,
                event: run.event,
                status: run.status,
                conclusion: run.conclusion,
                head_sha: run.head_sha,
                created_at: run.created_at,
                updated_at: run.updated_at,
                html_url: run.html_url,
                jobs
              });
            }

            const releasesResponse = await github.rest.repos.listReleases({
              owner,
              repo,
              per_page: 20
            });

            const releases = releasesResponse.data.map(release => ({
              id: release.id,
              tag_name: release.tag_name,
              name: release.name,
              draft: release.draft,
              prerelease: release.prerelease,
              created_at: release.created_at,
              published_at: release.published_at,
              html_url: release.html_url,
              assets: release.assets.map(asset => ({
                id: asset.id,
                name: asset.name,
                size: asset.size,
                updated_at: asset.updated_at,
                browser_download_url: asset.browser_download_url
              }))
            }));

            const body = JSON.stringify({
              generated_at: new Date().toISOString(),
              runs: runDetails,
              releases
            }, null, 2) + '\n';

            let sha;
            try {
              const existing = await github.rest.repos.getContent({
                owner,
                repo,
                path: outputPath,
                ref: branch
              });
              if (!Array.isArray(existing.data)) sha = existing.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path: outputPath,
              branch,
              message: 'record latest K4L workflow and release status',
              content: Buffer.from(body).toString('base64'),
              ...(sha ? { sha } : {})
            });

      - name: Remove temporary diagnostics workflow
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = 'main';
            for (const path of [
              '.github/workflows/k4l-run-diagnostics.yml',
              '.github/workflows/k4l-run-diagnostics.trigger'
            ]) {
              try {
                const current = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                if (Array.isArray(current.data)) continue;
                await github.rest.repos.deleteFile({
                  owner,
                  repo,
                  path,
                  branch,
                  sha: current.data.sha,
                  message: 'remove temporary K4L run diagnostics'
                });
              } catch (error) {
                if (error.status !== 404) core.warning(error.message);
              }
            }
